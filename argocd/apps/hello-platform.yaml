apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/anoopkum/azure-platform-engineering
    targetRevision: HEAD
    path: apps/hello-platform/helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: workloads
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
