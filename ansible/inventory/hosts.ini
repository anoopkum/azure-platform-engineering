# Static inventory for manual runs.
# For CI, use the azure_rm dynamic inventory plugin which discovers
# VMSS instances automatically from the ado-agents scale set.

[ado_agents]
# Populated dynamically from VMSS — run:
# ansible-inventory -i inventory/azure_rm.yml --list
# to discover current instance IPs.

[k8s_nodes]
# AKS nodes are managed by Azure — do not add here.
# Use kubectl for cluster operations.

[all:vars]
ansible_user=azureuser
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
