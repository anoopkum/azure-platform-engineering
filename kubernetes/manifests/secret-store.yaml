apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://apedevkvdev.vault.azure.net"
      tenantId: "e2e605ca-a105-4b19-bcb9-5b1ca2d5ce71"
      identityId: "c74adc3c-5487-4c74-8c70-4f1cb2a64193"
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
---
# Example ExternalSecret — copy and adapt per workload namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: example-secret
  namespace: workloads
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: example-secret
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: db-password
