# external-secrets SA is owned by the Helm chart — annotations are passed
# via the ArgoCD Application parameters in argocd/apps/external-secrets.yaml.
#
# cert-manager SA will be added here once its workload identity is provisioned
# via Terraform (CERT_MANAGER_WORKLOAD_IDENTITY_CLIENT_ID placeholder below).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-manager
  namespace: cert-manager
  annotations:
    azure.workload.identity/client-id: "${CERT_MANAGER_WORKLOAD_IDENTITY_CLIENT_ID}"
    azure.workload.identity/tenant-id: "${AZURE_TENANT_ID}"
  labels:
    azure.workload.identity/use: "true"
