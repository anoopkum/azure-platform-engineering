installCRDs: true

replicaCount: 2

nodeSelector:
  kubernetes.io/os: linux
  agentpool: user

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Workload identity for DNS-01 challenges against Azure DNS
serviceAccount:
  annotations:
    azure.workload.identity/client-id: "${CERT_MANAGER_WORKLOAD_IDENTITY_CLIENT_ID}"

podLabels:
  azure.workload.identity/use: "true"

webhook:
  replicaCount: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

cainjector:
  replicaCount: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

prometheus:
  enabled: true
  servicemonitor:
    enabled: false
