replicaCount: 2

nodeSelector:
  kubernetes.io/os: linux
  agentpool: user

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Workload identity for Azure Key Vault access
serviceAccount:
  annotations:
    azure.workload.identity/client-id: "${WORKLOAD_IDENTITY_CLIENT_ID}"

podLabels:
  azure.workload.identity/use: "true"

webhook:
  replicaCount: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  nodeSelector:
    kubernetes.io/os: linux
    agentpool: user

certController:
  replicaCount: 2
  nodeSelector:
    kubernetes.io/os: linux
    agentpool: user

prometheus:
  enabled: true
  servicemonitor:
    enabled: false
